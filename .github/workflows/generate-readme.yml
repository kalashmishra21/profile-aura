name: Generate README

on:
  push:
    branches:
      - main
    paths:
      - 'readme.source.md'
      - 'readme-aura.config.json'
      - '.github/workflows/generate-readme.yml'
  schedule:
    # Run every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Generate README
        env:
          GITHUB_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run generate

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🤖 Auto-generate README'
          file_pattern: 'README.md .github/assets/generated/*.svg'
          commit_user_name: 'readme-aura-bot'
          commit_user_email: 'bot@readme-aura.dev'
          commit_author: 'README Aura Bot <bot@readme-aura.dev>'
